## Weed Tycoon — nginx reverse proxy template
## - Remplace YOUR_DOMAIN_HERE par ton vrai domaine (ex: api.weedtycoon.example.com)
## - Une fois en place : sudo certbot --nginx -d YOUR_DOMAIN_HERE
## - certbot ajoutera automatiquement les blocs SSL nécessaires.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    # Let's Encrypt challenge (laissé pour cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirige tout le reste vers HTTPS (certbot ajoutera ce bloc, mais on le préempte)
    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloc HTTPS (sera complété/réécrit par certbot après --nginx)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # Les directives ssl_certificate seront injectées par certbot.
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # Headers sécurité minimaux
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Body size : protège contre les saves abusives
    client_max_body_size 256k;

    # Reverse proxy vers Node (Express sur 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Healthcheck no-auth public (utile pour monitoring uptime kuma etc.)
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
