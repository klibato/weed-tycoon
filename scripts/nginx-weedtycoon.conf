## Weed Tycoon — nginx reverse proxy
##
## Ce fichier est minimal exprès : pas de bloc 443 manuel. Une fois en place,
## `certbot --nginx -d <domaine>` ajoutera automatiquement le bloc HTTPS + injectera
## les paths des certs Let's Encrypt + activera le redirect HTTP → HTTPS.
##
## Avant certbot :
##   sudo sed -i 's|YOUR_DOMAIN_HERE|api.klbtcorp.cloud|g' /etc/nginx/sites-available/weedtycoon

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    # Body size : protège contre les saves abusives
    client_max_body_size 256k;

    # Headers sécurité minimaux
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Reverse proxy vers Node (Express sur 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Healthcheck no-auth public (utile pour monitoring uptime kuma etc.)
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
